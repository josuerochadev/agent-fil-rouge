<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" role="img" aria-label="pulse_">
  <style>
    @keyframes blink-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    .underscore { animation: blink-pulse 2s ease-in-out infinite; }
  </style>
  <text x="0" y="64"
        font-family="'Playfair Display', Georgia, serif"
        font-weight="900"
        font-size="72"
        letter-spacing="-0.02em"
        fill="#1a1a1a">pulse</text>
  <text x="205" y="64"
        font-family="'Playfair Display', Georgia, serif"
        font-weight="900"
        font-size="72"
        fill="#991b1b"
        class="underscore">_</text>
</svg>
